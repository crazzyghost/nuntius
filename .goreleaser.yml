version: 2
project_name: nuntius

builds:
  - main: ./cmd/nuntius
    binary: nuntius
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

brews:
  - repository:
      owner: crazzyghost
      name: homebrew-tap
    homepage: https://github.com/crazzyghost/nuntius
    description: AI-powered commit message generator TUI
    license: MIT
    test: |
      system "#{bin}/nuntius", "--version"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
